<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English AI Tutor - Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        #avatar-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            background: #007bff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .speaking {
            box-shadow: 0 0 20px #007bff;
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        svg { width: 80px; fill: white; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }
        #log { margin-top: 20px; font-size: 14px; color: #555; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>English Tutor AI</h2>
    <p style="font-size: 0.8rem; color: #888;">Projeto Educacional</p>
    
    <div id="avatar-container">
        <svg viewBox="0 0 24 24"><path d="M12,2C6.48,2,2,6.48,2,12s4.48,10,10,10s10-4.48,10-10S17.52,2,12,2z M12,20c-4.41,0-8-3.59-8-8s3.59-8,8-8s8,3.59,8,8 S16.41,20,12,20z M12,13c-1.1,0-2-0.9-2-2s0.9-2,2-2s2,0.9,2,2S13.1,13,12,13z"/></svg>
    </div>
    
    <input type="password" id="apiKey" placeholder="AIzaSyA-XrmUQwhEE3RkFy0GkXPu5LXoN6-_iXU">
    <button id="talkBtn">Segurar para Falar (Inglês)</button>
    
    <div id="log">Aguardando...</div>
</div>

<script>
    const talkBtn = document.getElementById('talkBtn');
    const log = document.getElementById('log');
    const avatar = document.getElementById('avatar-container');
    const apiKeyField = document.getElementById('apiKey');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';

        talkBtn.onmousedown = () => {
            if(!apiKeyField.value) return alert("Insira sua API Key!");
            recognition.start();
            log.innerText = "Ouvindo...";
        };

        talkBtn.onmouseup = () => {
            recognition.stop();
            log.innerText = "Processando...";
        };

        recognition.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            log.innerHTML = "<b>Você:</b> " + text;
            await askGemini(text);
        };
    }

    async function askGemini(prompt) {
        const key = apiKeyField.value;
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
        
        try {
            const resp = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "You are a friendly English teacher. Answer briefly in English: " + prompt }]}]
                })
            });
            const data = await resp.json();
            const reply = data.candidates[0].content.parts[0].text;
            speak(reply);
        } catch (e) {
            log.innerText = "Erro na API. Verifique sua chave.";
        }
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.onstart = () => avatar.classList.add('speaking');
        utterance.onend = () => {
            avatar.classList.remove('speaking');
            log.innerHTML += "<br><b>Tutor:</b> " + text;
        };
        window.speechSynthesis.speak(utterance);
    }
</script>
</body>
</html>
