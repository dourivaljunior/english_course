<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI English Tutor - Automático</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .avatar-box {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            position: relative;
        }

        #avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #333;
            transition: all 0.3s;
        }

        /* Efeito de pulso quando a IA fala */
        .ai-speaking #avatar-img {
            border-color: #00e676;
            transform: scale(1.05);
            box-shadow: 0 0 20px #00e676;
        }

        /* Efeito quando o microfone está ouvindo */
        .user-listening #avatar-img {
            border-color: #2979ff;
            box-shadow: 0 0 20px #2979ff;
        }

        .btn-control {
            background: #00e676;
            color: black;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,230,118,0.3);
            transition: 0.2s;
        }

        .btn-control.active {
            background: #ff5252;
            color: white;
        }

        #status-text {
            margin-top: 20px;
            height: 60px;
            font-style: italic;
            color: #bbb;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar-box" id="avatarContainer">
        <img id="avatar-img" src="https://api.dicebear.com/7.x/bottts/svg?seed=Mario&backgroundColor=2979ff" alt="Avatar">
    </div>

    <button id="mainBtn" class="btn-control">Iniciar Conversa</button>
    
    <div id="status-text">Pressione o botão para começar</div>
</div>

<script>
    // COLOQUE SUA CHAVE AQUI DENTRO DAS ASPAS
    const MINHA_CHAVE_API = "AIzaSyA-XrmUQwhEE3RkFy0GkXPu5LXoN6-_iXU"; 

    const mainBtn = document.getElementById('mainBtn');
    const statusText = document.getElementById('status-text');
    const avatarContainer = document.getElementById('avatarContainer');
    
    let isActive = false;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.continuous = false;
    recognition.interimResults = false;

    // Iniciar ou parar tudo
    mainBtn.onclick = () => {
        if (!isActive) {
            isActive = true;
            mainBtn.innerText = "Finalizar Conversa";
            mainBtn.classList.add('active');
            startListening();
        } else {
            location.reload(); // Reinicia a página para parar tudo limpamente
        }
    };

    function startListening() {
        if (!isActive) return;
        
        try {
            recognition.start();
            statusText.innerText = "Listening... Speak now!";
            avatarContainer.className = "avatar-box user-listening";
        } catch (e) {
            console.log("Reconhecimento já ativo");
        }
    }

    recognition.onresult = async (event) => {
        const voiceText = event.results[0][0].transcript;
        statusText.innerText = "You said: " + voiceText;
        avatarContainer.className = "avatar-box";
        
        await callGemini(voiceText);
    };

    async function callGemini(userInput) {
        statusText.innerText = "Thinking...";
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MINHA_CHAVE_API}`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "You are an English teacher. Reply to this in English, very briefly and naturally: " + userInput }]}]
                })
            });
            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            
            speak(reply);
        } catch (err) {
            statusText.innerText = "API Error. Check your Key.";
            isActive = false;
        }
    }

    function speak(text) {
        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';

        utterance.onstart = () => {
            avatarContainer.className = "avatar-box ai-speaking";
            statusText.innerText = "Tutor: " + text;
        };

        utterance.onend = () => {
            avatarContainer.className = "avatar-box";
            // A mágica: assim que a IA termina de falar, ela volta a ouvir o aluno
            if (isActive) {
                setTimeout(startListening, 500); 
            }
        };

        synth.speak(utterance);
    }

    // Se o reconhecimento parar sozinho sem resultado, tenta ouvir de novo se estiver ativo
    recognition.onend = () => {
        if (isActive && avatarContainer.className !== "avatar-box ai-speaking") {
            startListening();
        }
    };
</script>

</body>
</html>
