<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Tutor - Mario Edition</title>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --ai: #4ade80; --user: #f87171; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        .container { background: #1e293b; padding: 2.5rem; border-radius: 2rem; text-align: center; width: 90%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,0.6); border: 1px solid #334155; }
        
        .avatar-box { width: 180px; height: 180px; margin: 0 auto 1.5rem; border-radius: 50%; border: 6px solid #334155; overflow: hidden; transition: 0.4s ease; background: #0f172a; }
        #avatar-img { width: 100%; height: 100%; object-fit: cover; }
        
        .listening { border-color: var(--user); box-shadow: 0 0 30px var(--user); transform: scale(1.05); }
        .speaking { border-color: var(--ai); box-shadow: 0 0 30px var(--ai); transform: scale(1.05); }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { border: none; padding: 1rem; border-radius: 1rem; font-weight: bold; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        
        #startBtn { background: var(--accent); color: #0f172a; }
        #stopBtn { background: #334155; color: #94a3b8; }
        #startBtn:hover { background: #7dd3fc; }
        #stopBtn:hover { background: #ef4444; color: white; }

        #display-text { margin-top: 1.5rem; font-size: 0.9rem; height: 100px; overflow-y: auto; color: #cbd5e1; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; text-align: left; line-height: 1.4; }
        .file-info { font-size: 0.75rem; color: #64748b; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar-box" id="avatarUI">
        <img id="avatar-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mario" alt="AI Professor">
    </div>

    <div class="file-info">Select key.txt to start:</div>
    <input type="file" id="keyFile" accept=".txt" style="margin-bottom: 15px; font-size: 0.8rem; width: 100%;">

    <div class="controls">
        <button id="startBtn">START LESSON</button>
        <button id="stopBtn">STOP SESSION</button>
    </div>

    <div id="display-text">Waiting for key...</div>
</div>

<script>
    let API_KEY = "";
    let isRunning = false;
    const MODEL = "gemini-2.5-flash";

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const displayText = document.getElementById('display-text');
    const avatarUI = document.getElementById('avatarUI');
    const keyFile = document.getElementById('keyFile');

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.continuous = false;

    keyFile.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            API_KEY = ev.target.result.trim().replace(/[\n\r\t\s]/g, "");
            displayText.innerText = "Key loaded. Ready!";
        };
        reader.readAsText(e.target.files[0]);
    };

    startBtn.onclick = () => {
        if (!API_KEY) return alert("Select the key.txt file!");
        if (isRunning) return;
        isRunning = true;
        startBtn.style.opacity = "0.5";
        listen();
    };

    stopBtn.onclick = () => {
        location.reload();
    };

    function listen() {
        if (!isRunning) return;
        try {
            recognition.start();
            avatarUI.className = "avatar-box listening";
            displayText.innerHTML = "<b>Listening...</b>";
        } catch (e) {}
    }

    recognition.onresult = async (event) => {
        const userSpeech = event.results[0][0].transcript;
        displayText.innerHTML = `<b>You:</b> ${userSpeech}`;
        avatarUI.className = "avatar-box";
        await askMário(userSpeech);
    };

    async function askMário(text, retryCount = 0) {
        const maxRetries = 3;
        displayText.innerHTML = "<b>Thinking...</b>";
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "You are Mario, a charismatic English teacher. Give a very brief, natural answer in English to: " + text }]}]
                })
            });

            const data = await response.json();

            // Lógica de Re-tentativa para High Demand (Erro 503 ou 429)
            if (response.status === 503 || response.status === 429) {
                if (retryCount < maxRetries) {
                    displayText.innerHTML = `<i>Busy server... retrying (${retryCount + 1}/${maxRetries})</i>`;
                    await new Promise(res => setTimeout(res, 2500)); 
                    return askMário(text, retryCount + 1);
                }
            }

            if (data.error) throw new Error(data.error.message);

            const aiReply = data.candidates[0].content.parts[0].text;
            speak(aiReply);
        } catch (err) {
            displayText.innerHTML = `<span style="color:var(--user)">Error: ${err.message}</span>`;
            isRunning = false;
        }
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.onstart = () => {
            avatarUI.className = "avatar-box speaking";
            displayText.innerHTML = `<b>Mário:</b> ${text}`;
        };
        utterance.onend = () => {
            avatarUI.className = "avatar-box";
            if (isRunning) setTimeout(listen, 600);
        };
        window.speechSynthesis.speak(utterance);
    }

    recognition.onend = () => {
        if (isRunning && avatarUI.className.includes("listening")) {
            setTimeout(listen, 100);
        }
    };
</script>
</body>
</html>
