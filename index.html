<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mario Tutor - Groq Speed Edition</title>
    <style>
        :root { --bg: #0f172a; --accent: #f59e0b; --ai: #10b981; --user: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2.5rem; border-radius: 2rem; text-align: center; width: 90%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,0.6); border: 1px solid #334155; }
        .avatar-box { width: 160px; height: 160px; margin: 0 auto 1.5rem; border-radius: 50%; border: 6px solid #334155; overflow: hidden; transition: 0.3s; background: #0f172a; }
        #avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .listening { border-color: var(--user); box-shadow: 0 0 30px var(--user); }
        .speaking { border-color: var(--ai); box-shadow: 0 0 30px var(--ai); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { border: none; padding: 1rem; border-radius: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #startBtn { background: var(--accent); color: white; }
        #stopBtn { background: #334155; color: #94a3b8; }
        #display-text { margin-top: 1.5rem; font-size: 0.9rem; height: 100px; overflow-y: auto; color: #cbd5e1; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; text-align: left; }
    </style>
</head>
<body>

</body>
</html>
