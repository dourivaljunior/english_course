<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Tutor AI - Demo</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --user: #f87171;
            --ai: #4ade80;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .avatar-wrap {
            width: 180px;
            height: 180px;
            margin: 0 auto 2rem;
            border-radius: 50%;
            border: 4px solid #334155;
            position: relative;
            transition: all 0.4s ease;
            background: #0f172a;
            overflow: hidden;
        }

        #avatar-img { width: 100%; height: 100%; object-fit: cover; }

        /* Estados visuais do Avatar */
        .listening { border-color: var(--user); box-shadow: 0 0 25px var(--user); transform: scale(1.05); }
        .speaking { border-color: var(--ai); box-shadow: 0 0 25px var(--ai); animation: talk-glow 1s infinite; }
        .thinking { opacity: 0.5; filter: grayscale(1); }

        @keyframes talk-glow { 50% { opacity: 0.7; transform: scale(1.02); } }

        .btn-main {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 1.2rem;
            border-radius: 1rem;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-main.active { background: #ef4444; color: white; }

        #output-text {
            margin-top: 1.5rem;
            min-height: 60px;
            font-size: 0.95rem;
            color: #94a3b8;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar-wrap" id="avatarBox">
        <img id="avatar-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mário&backgroundColor=b6e3f4" alt="AI Avatar">
    </div>

    <button id="sessionBtn" class="btn-main">START CLASS</button>
    
    <div id="output-text">Click the button to start our English conversation.</div>
</div>

<script>
    // API Key inserida diretamente conforme solicitado
    const API_KEY = "AIzaSyA-XrmUQwhEE3RkFy0GkXPu5LXoN6-_iXU";
    
    const sessionBtn = document.getElementById('sessionBtn');
    const outputText = document.getElementById('output-text');
    const avatarBox = document.getElementById('avatarBox');

    let isRunning = false;
    const speech = window.speechSynthesis;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    
    recognition.lang = 'en-US';
    recognition.continuous = false;

    sessionBtn.onclick = () => {
        if (!isRunning) {
            isRunning = true;
            sessionBtn.innerText = "STOP SESSION";
            sessionBtn.classList.add('active');
            startListening();
        } else {
            location.reload();
        }
    };

    function startListening() {
        if (!isRunning) return;
        try {
            recognition.start();
            avatarBox.className = "avatar-wrap listening";
            outputText.innerText = "Listening... I'm all ears!";
        } catch (e) {}
    }

    recognition.onresult = async (event) => {
        const userText = event.results[0][0].transcript;
        outputText.innerHTML = `<b>You:</b> ${userText}`;
        avatarBox.className = "avatar-wrap thinking";
        
        await fetchAIResponse(userText);
    };

    async function fetchAIResponse(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "You are a friendly and interactive English teacher named Mário. Answer this briefly in English to continue the conversation: " + prompt }]}]
                })
            });
            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            triggerSpeech(aiText);
        } catch (err) {
            outputText.innerText = "Connection Error. Please check the API status.";
            isRunning = false;
        }
    }

    function triggerSpeech(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';

        utterance.onstart = () => {
            avatarBox.className = "avatar-wrap speaking";
            outputText.innerHTML += `<br><b>Mário:</b> ${text}`;
        };

        utterance.onend = () => {
            avatarBox.className = "avatar-wrap";
            // Reinicia a escuta automaticamente para interação contínua
            if (isRunning) setTimeout(startListening, 500);
        };

        speech.speak(utterance);
    }

    // Garante que o reconhecimento reinicie se falhar ou houver silêncio longo
    recognition.onend = () => {
        if (isRunning && avatarBox.className.includes("listening")) {
            startListening();
        }
    };
</script>

</body>
</html>
