<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Avatar - Teste Local</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 20px;
        }

        .avatar-section {
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }

        #avatar-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        @keyframes speak {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes listen {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        @keyframes think {
            0%, 100% { opacity: 1; transform: translateY(0px); }
            50% { opacity: 0.8; transform: translateY(-10px); }
        }

        .avatar-speaking { animation: speak 0.5s ease-in-out infinite; }
        .avatar-listening { animation: listen 0.8s ease-in-out infinite; }
        .avatar-thinking { animation: think 1s ease-in-out infinite; }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
            font-weight: bold;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4CAF50;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .chat-area {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { justify-content: flex-end; }
        .message.ai { justify-content: flex-start; }

        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #record-btn {
            background: #ff4444;
            color: white;
        }

        #record-btn.recording {
            background: #cc0000;
            animation: pulse 1s infinite;
        }

        #clear-btn {
            background: #6c757d;
            color: white;
        }

        button:active { transform: scale(0.98); }

        .text-input {
            display: flex;
            gap: 10px;
        }

        #text-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }

        #text-input:focus { border-color: #667eea; }

        #send-btn {
            background: #667eea;
            color: white;
            width: auto;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info {
            background: #e8f4fd;
            border-radius: 10px;
            padding: 10px;
            margin-top: 15px;
            font-size: 12px;
            color: #0056b3;
            text-align: center;
        }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            #avatar-img { width: 150px; height: 150px; }
            .message-content { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar-section">
            <img id="avatar-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Emma&backgroundColor=b6e3f4" alt="Avatar">
            <div class="status">
                <span class="status-indicator"></span>
                <span id="status-text">Pronto para conversar</span>
            </div>
        </div>

        <div class="chat-area" id="chat-area">
            <div class="message ai">
                <div class="message-content">
                    👋 Hello! I'm Emma. Click the microphone and speak in English!
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="record-btn">🎤 Speak Now</button>
            <button id="clear-btn">🗑️ Clear Chat</button>
        </div>

        <div class="text-input">
            <input type="text" id="text-input" placeholder="Or type your message in English...">
            <button id="send-btn">Send 📤</button>
        </div>

        <div class="info">
            🔧 Modo de teste local | A chave API está no código (seguro apenas para testes no seu PC)
        </div>
    </div>

    <script>
        // ============================================================
        // COLE SUA CHAVE DA API DO GOOGLE GEMINI AQUI (teste local)
        // Obtenha em: https://aistudio.google.com/apikey
        // ============================================================
        const GEMINI_API_KEY = 'AIzaSyA-XrmUQwhEE3RkFy0GkXPu5LXoN6-_iXU';  // ← SUBSTITUA PELA SUA CHAVE!
        // ============================================================

        let isRecording = false;
        let recognition = null;

        const avatarImg = document.getElementById('avatar-img');
        const statusText = document.getElementById('status-text');
        const recordBtn = document.getElementById('record-btn');
        const clearBtn = document.getElementById('clear-btn');
        const sendBtn = document.getElementById('send-btn');
        const textInput = document.getElementById('text-input');
        const chatArea = document.getElementById('chat-area');

        // Verificar se a chave foi configurada
        if (GEMINI_API_KEY === 'COLE_SUA_CHAVE_AQUI') {
            addMessage("⚠️ Please configure your Google API Key in the script. Get it from aistudio.google.com/apikey", false);
        }

        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            messageDiv.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai';
            loadingDiv.id = 'loading-message';
            loadingDiv.innerHTML = `<div class="message-content"><div class="loading"></div> Thinking...</div>`;
            chatArea.appendChild(loadingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function hideLoading() {
            const loading = document.getElementById('loading-message');
            if (loading) loading.remove();
        }

        function animateAvatar(action) {
            avatarImg.classList.remove('avatar-speaking', 'avatar-listening', 'avatar-thinking');
            switch(action) {
                case 'speaking':
                    avatarImg.classList.add('avatar-speaking');
                    statusText.innerText = '🤖 Speaking...';
                    break;
                case 'listening':
                    avatarImg.classList.add('avatar-listening');
                    statusText.innerText = '🎧 Listening...';
                    break;
                case 'thinking':
                    avatarImg.classList.add('avatar-thinking');
                    statusText.innerText = '💭 Thinking...';
                    break;
                default:
                    avatarImg.classList.remove('avatar-speaking', 'avatar-listening', 'avatar-thinking');
                    statusText.innerText = '✅ Ready';
            }
        }

        function speakText(text) {
            return new Promise((resolve) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    utterance.pitch = 1.0;
                    utterance.onstart = () => animateAvatar('speaking');
                    utterance.onend = () => { animateAvatar('ready'); resolve(); };
                    utterance.onerror = () => { animateAvatar('ready'); resolve(); };
                    window.speechSynthesis.speak(utterance);
                } else {
                    resolve();
                }
            });
        }

        // Chamada direta para API do Google Gemini (funciona localmente)
        async function callGeminiAI(message) {
            if (GEMINI_API_KEY === 'COLE_SUA_CHAVE_AQUI') {
                return "⚠️ Please configure your Google API Key in the code first. Get it for free at aistudio.google.com/apikey";
            }

            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `You are Emma, a friendly English conversation partner. Keep responses very short (1-2 sentences), natural, and helpful. Respond to this: ${message}`
                                }]
                            }],
                            generationConfig: {
                                temperature: 0.7,
                                maxOutputTokens: 100
                            }
                        })
                    }
                );

                if (!response.ok) {
                    const errorData = await response.json();
                    console.error('API Error:', errorData);
                    
                    if (response.status === 403 || response.status === 400) {
                        return "❌ Invalid API Key. Please check your key at aistudio.google.com/apikey";
                    }
                    return `❌ Error: ${errorData.error?.message || 'Unknown error'}`;
                }

                const data = await response.json();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (reply) {
                    return reply;
                }
                return "I'm not sure how to respond. Could you say that differently?";

            } catch (error) {
                console.error('Network Error:', error);
                return "⚠️ Network error. Please check your internet connection.";
            }
        }

        async function processMessage(userMessage) {
            if (!userMessage.trim()) return;

            if (recognition && isRecording) recognition.stop();
            
            addMessage(userMessage, true);
            showLoading();
            animateAvatar('thinking');
            
            const aiResponse = await callGeminiAI(userMessage);
            hideLoading();
            addMessage(aiResponse, false);
            await speakText(aiResponse);
        }

        function setupSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                addMessage("⚠️ Speech recognition not supported. Please use Chrome browser.", false);
                recordBtn.disabled = true;
                recordBtn.style.opacity = '0.5';
                return;
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = () => {
                isRecording = true;
                recordBtn.innerHTML = '🔴 Recording...';
                recordBtn.classList.add('recording');
                animateAvatar('listening');
                statusText.innerText = '🎙️ Speak now...';
            };
            
            recognition.onend = () => {
                isRecording = false;
                recordBtn.innerHTML = '🎤 Speak Now';
                recordBtn.classList.remove('recording');
                if (statusText.innerText !== '🤖 Speaking...') animateAvatar('ready');
            };
            
            recognition.onresult = (event) => {
                const userMessage = event.results[0][0].transcript;
                processMessage(userMessage);
            };
            
            recognition.onerror = (event) => {
                console.error('Speech error:', event.error);
                isRecording = false;
                recordBtn.innerHTML = '🎤 Speak Now';
                recordBtn.classList.remove('recording');
                animateAvatar('ready');
                
                if (event.error === 'not-allowed') {
                    addMessage("⚠️ Microphone access denied. Please allow microphone permissions.", false);
                }
            };
        }

        // Event listeners
        recordBtn.addEventListener('click', () => {
            if (recognition) {
                if (isRecording) recognition.stop();
                else recognition.start();
            }
        });
        
        sendBtn.addEventListener('click', () => {
            const message = textInput.value.trim();
            if (message) {
                processMessage(message);
                textInput.value = '';
            }
        });
        
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
        
        clearBtn.addEventListener('click', () => {
            chatArea.innerHTML = '';
            addMessage("✨ Chat cleared! Ready to help you practice English.", false);
        });
        
        // Inicializar
        setupSpeechRecognition();
        console.log('🚀 App ready!');
    </script>
</body>
</html>
