<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mario Tutor - Groq Speed Edition</title>
    <style>
        :root { --bg: #0f172a; --accent: #f59e0b; --ai: #10b981; --user: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2.5rem; border-radius: 2rem; text-align: center; width: 90%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,0.6); border: 1px solid #334155; }
        .avatar-box { width: 160px; height: 160px; margin: 0 auto 1.5rem; border-radius: 50%; border: 6px solid #334155; overflow: hidden; transition: 0.3s; background: #0f172a; }
        #avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .listening { border-color: var(--user); box-shadow: 0 0 30px var(--user); }
        .speaking { border-color: var(--ai); box-shadow: 0 0 30px var(--ai); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { border: none; padding: 1rem; border-radius: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #startBtn { background: var(--accent); color: white; }
        #stopBtn { background: #334155; color: #94a3b8; }
        #display-text { margin-top: 1.5rem; font-size: 0.9rem; height: 100px; overflow-y: auto; color: #cbd5e1; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar-box" id="avatarUI">
        <img id="avatar-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mario" alt="Mario">
    </div>
    <input type="file" id="keyFile" accept=".txt" style="margin-bottom: 15px; font-size: 0.8rem; width: 100%;">
    <div class="controls">
        <button id="startBtn">START GROQ</button>
        <button id="stopBtn">STOP</button>
    </div>
    <div id="display-text">Load Groq Key to begin...</div>
</div>

<script>
    let GROQ_KEY = "";
    let isRunning = false;

    const startBtn = document.getElementById('startBtn');
    const displayText = document.getElementById('display-text');
    const avatarUI = document.getElementById('avatarUI');
    const keyFile = document.getElementById('keyFile');

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';

    keyFile.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            GROQ_KEY = ev.target.result.trim().replace(/[\n\r\t\s]/g, "");
            displayText.innerText = "Groq Key Loaded!";
        };
        reader.readAsText(e.target.files[0]);
    };

    startBtn.onclick = () => {
        if (!GROQ_KEY) return alert("Select your Groq key.txt!");
        isRunning = true;
        startBtn.style.opacity = "0.5";
        listen();
    };

    document.getElementById('stopBtn').onclick = () => location.reload();

    function listen() {
        if (!isRunning) return;
        try {
            recognition.start();
            avatarUI.className = "avatar-box listening";
            displayText.innerHTML = "<b>Listening...</b>";
        } catch (e) {}
    }

    recognition.onresult = async (event) => {
        const userSpeech = event.results[0][0].transcript;
        displayText.innerHTML = `<b>You:</b> ${userSpeech}`;
        avatarUI.className = "avatar-box";
        await askGroq(userSpeech);
    };

    async function askGroq(text) {
        displayText.innerHTML = "<b>Groq is thinking...</b>";
        
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile", // Modelo ultra rápido e inteligente
                    messages: [
                        { role: "system", content: "You are Mario, a friendly English teacher. Short answers only." },
                        { role: "user", content: text }
                    ],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            const aiReply = data.choices[0].message.content;
            speak(aiReply);
        } catch (err) {
            displayText.innerHTML = `Error: ${err.message}`;
        }
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.onstart = () => {
            avatarUI.className = "avatar-box speaking";
            displayText.innerHTML = `<b>Mário:</b> ${text}`;
        };
        utterance.onend = () => {
            avatarUI.className = "avatar-box";
            if (isRunning) setTimeout(listen, 400);
        };
        window.speechSynthesis.speak(utterance);
    }
</script>
</body>
</html>
