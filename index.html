<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Tutor - Groq Premium</title>
    <style>
        /* Paleta de Cores Cintilantes */
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --cyber-blue: #00d2ff;
            --neon-green: #39ff14;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 2.5rem;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.15);
            border: 1px solid rgba(0, 210, 255, 0.3);
            position: relative;
        }

        /* Avatar 3D Reativo */
        .avatar-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 2rem;
        }

        .avatar-box {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #000;
            border: 4px solid var(--cyber-blue);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        #avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(1.1);
        }

        /* Animações de Estado */
        .listening {
            border-color: #ff4d4d !important;
            box-shadow: 0 0 40px rgba(255, 77, 77, 0.6) !important;
            transform: scale(1.08);
        }

        .speaking {
            border-color: var(--neon-green) !important;
            box-shadow: 0 0 40px rgba(57, 255, 20, 0.6) !important;
            transform: scale(1.05);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1.05); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1.05); }
        }

        /* Controles e Inputs */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            border: none;
            padding: 1.2rem;
            border-radius: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        #startBtn {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        #stopBtn {
            background: rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        button:hover { transform: translateY(-3px); filter: brightness(1.2); }

        #display-text {
            margin-top: 2rem;
            font-size: 1rem;
            height: 110px;
            overflow-y: auto;
            color: #e2e8f0;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 1.2rem;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .file-upload {
            font-size: 0.8rem;
            color: var(--cyber-blue);
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar-container">
        <div class="avatar-box" id="avatarUI">
            <!-- Avatar estilo Boneco Tech / Robot -->
            <img id="avatar-img" src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Mario&backgroundColor=000000" alt="Avatar Mario">
        </div>
    </div>

    <label class="file-upload">LOAD KEY.TXT TO ACTIVATE TUTOR</label>
    <input type="file" id="keyFile" accept=".txt" style="margin-bottom: 20px; width: 100%;">

    <div class="controls">
        <button id="startBtn">Initiate Class</button>
        <button id="stopBtn">End Session</button>
    </div>

    <div id="display-text">System offline. Please load credentials.</div>
</div>

<script>
    let GROQ_KEY = "";
    let isRunning = false;

    const startBtn = document.getElementById('startBtn');
    const displayText = document.getElementById('display-text');
    const avatarUI = document.getElementById('avatarUI');
    const keyFile = document.getElementById('keyFile');

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';

    keyFile.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            GROQ_KEY = ev.target.result.trim().replace(/[\n\r\t\s]/g, "");
            displayText.innerText = "Connection Authorized. Ready to speak.";
        };
        reader.readAsText(e.target.files[0]);
    };

    startBtn.onclick = () => {
        if (!GROQ_KEY) return alert("API Key required!");
        isRunning = true;
        startBtn.style.opacity = "0.5";
        listen();
    };

    document.getElementById('stopBtn').onclick = () => location.reload();

    function listen() {
        if (!isRunning) return;
        try {
            recognition.start();
            avatarUI.className = "avatar-box listening";
            displayText.innerHTML = "<span style='color:#ff4d4d'>● Listening for your voice...</span>";
        } catch (e) {}
    }

    recognition.onresult = async (event) => {
        const userSpeech = event.results[0][0].transcript;
        displayText.innerHTML = `<span style='color:var(--cyber-blue)'><b>User:</b></span> ${userSpeech}`;
        avatarUI.className = "avatar-box";
        await askGroq(userSpeech);
    };

    async function askGroq(text) {
        displayText.innerHTML = "<span style='color:var(--neon-green)'><b>Mário is processing...</b></span>";
        
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "You are Mario, an enthusiastic English professor. Be friendly, correct errors, and keep responses concise." },
                        { role: "user", content: text }
                    ]
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            const aiReply = data.choices[0].message.content;
            speak(aiReply);
        } catch (err) {
            displayText.innerHTML = `<span style='color:#ff4d4d'>Error: ${err.message}</span>`;
        }
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.pitch = 1.1; // Tom de voz um pouco mais animado
        
        utterance.onstart = () => {
            avatarUI.className = "avatar-box speaking";
            displayText.innerHTML = `<span style='color:var(--neon-green)'><b>Mário:</b></span> ${text}`;
        };
        utterance.onend = () => {
            avatarUI.className = "avatar-box";
            if (isRunning) setTimeout(listen, 500);
        };
        window.speechSynthesis.speak(utterance);
    }
</script>
</body>
</html>
