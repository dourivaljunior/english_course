<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Avatar - Converse em Inglês</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 20px;
        }

        .avatar-section {
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            position: relative;
        }

        #avatar-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        /* Animações do Avatar */
        @keyframes speak {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes listen {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        @keyframes think {
            0%, 100% { opacity: 1; transform: translateY(0px); }
            50% { opacity: 0.8; transform: translateY(-10px); }
        }

        .avatar-speaking {
            animation: speak 0.5s ease-in-out infinite;
        }

        .avatar-listening {
            animation: listen 0.8s ease-in-out infinite;
        }

        .avatar-thinking {
            animation: think 1s ease-in-out infinite;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
            font-weight: bold;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4CAF50;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .chat-area {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #record-btn {
            background: #ff4444;
            color: white;
        }

        #record-btn.recording {
            background: #cc0000;
            animation: pulse 1s infinite;
        }

        #clear-btn {
            background: #6c757d;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .text-input {
            display: flex;
            gap: 10px;
        }

        #text-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        #text-input:focus {
            border-color: #667eea;
        }

        #send-btn {
            background: #667eea;
            color: white;
            padding: 12px 20px;
            width: auto;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Aviso de configuração */
        .config-warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-size: 12px;
            color: #856404;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            #avatar-img {
                width: 150px;
                height: 150px;
            }
            
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar-section">
            <img id="avatar-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Emma&backgroundColor=b6e3f4" alt="Avatar">
            <div class="status">
                <span class="status-indicator"></span>
                <span id="status-text">Pronto para conversar</span>
            </div>
        </div>

        <div class="chat-area" id="chat-area">
            <div class="message ai">
                <div class="message-content">
                    👋 Hello! I'm Emma, your AI assistant. Click the microphone button and speak in English to talk with me!
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="record-btn">
                🎤 Speak Now
            </button>
            <button id="clear-btn">
                🗑️ Clear Chat
            </button>
        </div>

        <div class="text-input">
            <input type="text" id="text-input" placeholder="Or type your message in English...">
            <button id="send-btn">
                Send 📤
            </button>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURAÇÃO DA API - VOCÊ PRECISA CONFIGURAR AQUI!
        // ============================================================
        // PASSO 1: Obtenha seu token em: https://huggingface.co/settings/tokens
        // PASSO 2: Crie um token "Fine-grained" e marque a permissão "Make calls to Inference Providers"
        // PASSO 3: Cole o token abaixo (exemplo: hf_xxxxxxxxxxxxxxxxxxxxx)
        // ============================================================
        
        const HF_TOKEN = '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';  // ⚠️ COLOQUE SEU TOKEN AQUI!
        
        // MODELO FUNCIONAL (confirmado que funciona no plano gratuito)
        // Fonte: https://huggingface.co/models?inference=warm&pipeline_tag=text-generation
        const MODEL = 'HuggingFaceH4/zephyr-7b-beta';  // Modelo gratuito e funcional!
        
        // ============================================================
        
        // Variáveis globais
        let isRecording = false;
        let recognition = null;
        
        // Elementos DOM
        const avatarImg = document.getElementById('avatar-img');
        const statusText = document.getElementById('status-text');
        const recordBtn = document.getElementById('record-btn');
        const clearBtn = document.getElementById('clear-btn');
        const sendBtn = document.getElementById('send-btn');
        const textInput = document.getElementById('text-input');
        const chatArea = document.getElementById('chat-area');
        
        // Verificar se o token foi configurado
        if (HF_TOKEN === 'SEU_TOKEN_AQUI') {
            const warningDiv = document.createElement('div');
            warningDiv.className = 'config-warning';
            warningDiv.innerHTML = '⚠️ <strong>Token não configurado!</strong> Para usar a IA, obtenha um token gratuito em <a href="https://huggingface.co/settings/tokens" target="_blank">huggingface.co/settings/tokens</a> e substitua no código. Por enquanto, usando modo de demonstração.';
            document.querySelector('.container').insertBefore(warningDiv, document.querySelector('.avatar-section'));
        }
        
        // Função para adicionar mensagem ao chat
        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            messageDiv.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return messageDiv;
        }
        
        // Função para escapar HTML (segurança)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Função para mostrar loading
        function showLoading(isUser) {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            loadingDiv.id = 'loading-message';
            loadingDiv.innerHTML = `<div class="message-content"><div class="loading"></div> Thinking...</div>`;
            chatArea.appendChild(loadingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function hideLoading() {
            const loading = document.getElementById('loading-message');
            if (loading) loading.remove();
        }
        
        // Função para animar o avatar
        function animateAvatar(action) {
            avatarImg.classList.remove('avatar-speaking', 'avatar-listening', 'avatar-thinking');
            
            switch(action) {
                case 'speaking':
                    avatarImg.classList.add('avatar-speaking');
                    statusText.innerText = '🤖 Speaking...';
                    break;
                case 'listening':
                    avatarImg.classList.add('avatar-listening');
                    statusText.innerText = '🎧 Listening...';
                    break;
                case 'thinking':
                    avatarImg.classList.add('avatar-thinking');
                    statusText.innerText = '💭 Thinking...';
                    break;
                default:
                    statusText.innerText = '✅ Ready';
            }
        }
        
        // Função para converter texto em voz
        function speakText(text) {
            return new Promise((resolve, reject) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    utterance.pitch = 1.0;
                    utterance.volume = 1;
                    
                    utterance.onstart = () => animateAvatar('speaking');
                    utterance.onend = () => { animateAvatar('ready'); resolve(); };
                    utterance.onerror = (error) => { console.error('TTS Error:', error); animateAvatar('ready'); reject(error); };
                    
                    window.speechSynthesis.speak(utterance);
                } else {
                    reject(new Error('Speech synthesis not supported'));
                }
            });
        }
        
        // Função para chamar a API do Hugging Face (CORRIGIDA)
        async function callAI(message) {
            // Modo demonstração se não tiver token
            if (HF_TOKEN === 'SEU_TOKEN_AQUI') {
                console.log('Usando modo demonstração');
                await new Promise(resolve => setTimeout(resolve, 1000));
                const demoResponses = [
                    `That's interesting! Tell me more about "${message}".`,
                    `I understand. How does that make you feel?`,
                    `Great question! ${message} is a fascinating topic to explore.`,
                    `Thanks for sharing! Is there anything specific you'd like to know?`,
                    `I'm here to help you practice English! Can you elaborate on that?`
                ];
                return demoResponses[Math.floor(Math.random() * demoResponses.length)];
            }
            
            try {
                // CORREÇÃO 1: Headers corretos para o token
                const response = await fetch(
                    `https://api-inference.huggingface.co/models/${MODEL}`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${HF_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            inputs: `<|user|>\n${message}\n<|assistant|>\n`,
                            parameters: {
                                max_new_tokens: 150,
                                temperature: 0.7,
                                top_p: 0.9,
                                do_sample: true,
                                return_full_text: false
                            }
                        })
                    }
                );
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('API Error:', response.status, errorText);
                    
                    if (response.status === 401) {
                        return "Authentication error: Please check your Hugging Face token and make sure it has 'Inference Providers' permissions.";
                    } else if (response.status === 503) {
                        return "The AI model is loading. Please wait a few seconds and try again.";
                    } else {
                        return `API Error (${response.status}): The service is temporarily unavailable. Please try again.`;
                    }
                }
                
                const data = await response.json();
                console.log('API Response:', data);
                
                // Extrair o texto gerado
                if (data && Array.isArray(data) && data[0] && data[0].generated_text) {
                    let reply = data[0].generated_text;
                    // Limpar possíveis artifacts do formato de mensagem
                    reply = reply.replace(/<\|assistant\|>/g, '').trim();
                    return reply || "I'm not sure how to respond to that.";
                }
                
                if (data && data.generated_text) {
                    let reply = data.generated_text;
                    reply = reply.replace(/<\|assistant\|>/g, '').trim();
                    return reply;
                }
                
                return "I received your message but I'm not sure how to respond. Could you rephrase?";
                
            } catch (error) {
                console.error('Network Error:', error);
                return "Network error: Unable to reach the AI service. Please check your internet connection and try again.";
            }
        }
        
        // Função principal para processar mensagem
        async function processMessage(userMessage) {
            if (!userMessage.trim()) return;
            
            if (recognition && isRecording) {
                recognition.stop();
            }
            
            addMessage(userMessage, true);
            showLoading(false);
            animateAvatar('thinking');
            
            try {
                const aiResponse = await callAI(userMessage);
                hideLoading();
                addMessage(aiResponse, false);
                await speakText(aiResponse);
            } catch (error) {
                console.error('Error:', error);
                hideLoading();
                addMessage("Sorry, something went wrong. Please try again.", false);
                animateAvatar('ready');
            }
        }
        
        // Configurar reconhecimento de voz
        function setupSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                const errorMsg = document.createElement('div');
                errorMsg.className = 'config-warning';
                errorMsg.innerHTML = '⚠️ Seu navegador não suporta reconhecimento de voz. Use Chrome ou Edge para melhor experiência.';
                document.querySelector('.container').insertBefore(errorMsg, document.querySelector('.avatar-section'));
                recordBtn.disabled = true;
                recordBtn.style.opacity = '0.5';
                return;
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            
            recognition.onstart = () => {
                isRecording = true;
                recordBtn.innerHTML = '🔴 Recording...';
                recordBtn.classList.add('recording');
                animateAvatar('listening');
                statusText.innerText = '🎙️ Speak now in English...';
            };
            
            recognition.onend = () => {
                isRecording = false;
                recordBtn.innerHTML = '🎤 Speak Now';
                recordBtn.classList.remove('recording');
                if (statusText.innerText !== '🤖 Speaking...') {
                    animateAvatar('ready');
                }
            };
            
            recognition.onresult = (event) => {
                const userMessage = event.results[0][0].transcript;
                statusText.innerText = '✅ Message received!';
                processMessage(userMessage);
            };
            
            recognition.onerror = (event) => {
                console.error('Speech error:', event.error);
                isRecording = false;
                recordBtn.innerHTML = '🎤 Speak Now';
                recordBtn.classList.add('recording');
                animateAvatar('ready');
                
                if (event.error === 'not-allowed') {
                    alert('Please allow microphone access to use voice input.');
                } else {
                    statusText.innerText = '⚠️ Could not understand, try again';
                    setTimeout(() => animateAvatar('ready'), 2000);
                }
            };
        }
        
        // Event Listeners
        recordBtn.addEventListener('click', () => {
            if (recognition) {
                if (isRecording) {
                    recognition.stop();
                } else {
                    try {
                        recognition.start();
                    } catch (error) {
                        console.error('Could not start recognition:', error);
                    }
                }
            }
        });
        
        sendBtn.addEventListener('click', () => {
            const message = textInput.value.trim();
            if (message) {
                processMessage(message);
                textInput.value = '';
            }
        });
        
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });
        
        clearBtn.addEventListener('click', () => {
            chatArea.innerHTML = '';
            addMessage("✨ Chat cleared! How can I help you today?", false);
        });
        
        // Inicialização
        function init() {
            setupSpeechRecognition();
            console.log('🚀 App ready!');
            console.log('Modelo configurado:', MODEL);
            if (HF_TOKEN === 'SEU_TOKEN_AQUI') {
                console.warn('⚠️ Modo demonstração ativo. Configure seu token do Hugging Face para usar IA real.');
            } else {
                console.log('✅ Token configurado! Usando IA real via Hugging Face.');
            }
        }
        
        init();
    </script>
</body>
</html>
