<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Validador de Chave Gemini</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #log { background: #eee; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
        .error { color: red; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Teste de Conexão Gemini</h2>
    <p>1. Selecione seu arquivo <b>key.txt</b>:</p>
    <input type="file" id="fileInput" accept=".txt">
    <br><br>
    <button id="testBtn">Testar Conexão Agora</button>

    <div id="log">Aguardando arquivo...</div>

    <script>
        let apiKey = "";

        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                apiKey = ev.target.result.trim().replace(/[\n\r\t\s]/g, "");
                document.getElementById('log').innerText = "Chave carregada! Clique no botão para testar.";
            };
            reader.readAsText(e.target.files[0]);
        };

        document.getElementById('testBtn').onclick = async () => {
            if (!apiKey) return alert("Selecione o arquivo primeiro!");
            
            const log = document.getElementById('log');
            log.innerHTML = "Enviando requisição de teste...";

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Diga apenas: A CONEXÃO FUNCIONOU" }]}]
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    const texto = data.candidates[0].content.parts[0].text;
                    log.innerHTML = `<span class="success">SUCESSO!</span>\nResposta da IA: ${texto}`;
                } else {
                    log.innerHTML = `<span class="error">ERRO NA API:</span>\n${JSON.stringify(data.error, null, 2)}`;
                }
            } catch (err) {
                log.innerHTML = `<span class="error">ERRO DE REDE/CORS:</span>\n${err.message}`;
            }
        };
    </script>
</body>
</html>
